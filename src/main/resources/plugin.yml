name: SaplingShop
version: 1.0.0
main: me.saplingshop.SaplingShop
api-version: 1.21
author: SaplingShop
description: Продавай саженцы за монеты (Nether Star), покупай руды, зачарования, отделки брони и генераторы.

commands:
  shopsell:
    description: Открыть магазин продажи саженцев
    usage: /shopsell
    permission: saplingshop.sell

  shopbuy:
    description: Открыть магазин покупки (руды, зачарования, отделки брони)
    usage: /shopbuy
    permission: saplingshop.buy

  shopgen:
    description: Открыть магазин генераторов руд
    usage: /shopgen
    permission: saplingshop.gen

permissions:
  saplingshop.sell:
    description: Доступ к /shopsell
    default: true
  saplingshop.buy:
    description: Доступ к /shopbuy
    default: true
  saplingshop.gen:
    description: Доступ к /shopgen
    default: true
  saplingshop.admin:
    description: Права администратора
    default: op
